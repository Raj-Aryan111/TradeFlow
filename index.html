<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeFlow — Trading Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body data-theme="dark">

  <!-- ============ TICKER TAPE (signature element) ============ -->
  <div class="ticker-tape" id="tickerTape" aria-hidden="true">
    <div class="ticker-track" id="tickerTrack"></div>
  </div>

  <div class="app-shell">

    <!-- ============ SIDEBAR ============ -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <span class="brand-mark">TF</span>
        <span class="brand-name">TradeFlow</span>
      </div>

      <nav class="nav">
        <button class="nav-item active" data-view="dashboard">
          <svg viewBox="0 0 24 24" class="nav-icon"><path d="M3 13h4v8H3zM10 3h4v18h-4zM17 8h4v13h-4z"/></svg>
          <span>Dashboard</span>
        </button>
        <button class="nav-item" data-view="portfolio">
          <svg viewBox="0 0 24 24" class="nav-icon"><path d="M4 4h16v4H4zM4 10h16v10H4z"/></svg>
          <span>Portfolio</span>
        </button>
        <button class="nav-item" data-view="watchlist">
          <svg viewBox="0 0 24 24" class="nav-icon"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
          <span>Watchlist</span>
        </button>
        <button class="nav-item" data-view="orders">
          <svg viewBox="0 0 24 24" class="nav-icon"><path d="M5 3h14v18l-7-4-7 4z"/></svg>
          <span>Orders</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <svg viewBox="0 0 24 24" class="nav-icon"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.4 5.4 0 0 1-7.54-7.54A9.09 9.09 0 0 0 12 3z"/></svg>
          <span id="themeLabel">Dark mode</span>
        </button>
      </div>
    </aside>

    <!-- ============ MAIN ============ -->
    <div class="main">

      <!-- TOP BAR -->
      <header class="topbar">
        <button class="menu-btn" id="menuBtn" aria-label="Toggle menu">
          <svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        </button>

        <div class="search-box">
          <svg viewBox="0 0 24 24" class="search-icon"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
          <input type="text" id="searchInput" placeholder="Search ticker, e.g. AAPL, TSLA…" autocomplete="off">
        </div>

        <div class="topbar-actions">
          <button class="icon-btn" id="notifBtn" aria-label="Notifications">
            <svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
            <span class="badge" id="notifBadge">3</span>
          </button>
          <div class="notif-panel" id="notifPanel"></div>

          <div class="user-chip">
            <span class="avatar">JD</span>
            <span class="user-name">Jordan Diaz</span>
          </div>
        </div>
      </header>

      <!-- CONTENT -->
      <main class="content">

        <!-- Portfolio summary -->
        <section class="summary-grid" id="summaryGrid" aria-label="Portfolio summary"></section>

        <div class="content-grid">

          <!-- Chart card -->
          <section class="card chart-card">
            <div class="card-head">
              <div class="symbol-tabs" id="symbolTabs"></div>
              <div class="range-tabs" id="rangeTabs">
                <button class="range-btn" data-range="1D">1D</button>
                <button class="range-btn active" data-range="1W">1W</button>
                <button class="range-btn" data-range="1M">1M</button>
                <button class="range-btn" data-range="1Y">1Y</button>
              </div>
            </div>
            <div class="chart-price-row">
              <span class="chart-price" id="chartPrice">--</span>
              <span class="chart-change" id="chartChange">--</span>
            </div>
            <div class="chart-wrap">
              <canvas id="priceChart"></canvas>
            </div>
          </section>

          <!-- Buy/Sell ticket -->
          <section class="card ticket-card">
            <div class="card-head"><h2>Trade</h2></div>
            <div class="ticket-tabs">
              <button class="ticket-tab active" data-side="buy">Buy</button>
              <button class="ticket-tab" data-side="sell">Sell</button>
            </div>
            <form id="tradeForm" class="ticket-form">
              <label class="field">
                <span>Symbol</span>
                <input type="text" id="ticketSymbol" value="AAPL" maxlength="6" required>
              </label>
              <label class="field">
                <span>Quantity</span>
                <input type="number" id="ticketQty" value="10" min="1" required>
              </label>
              <div class="ticket-summary">
                <div class="row"><span>Market price</span><span id="ticketPrice">--</span></div>
                <div class="row total"><span>Estimated total</span><span id="ticketTotal">--</span></div>
              </div>
              <button type="submit" class="btn-primary" id="ticketSubmit">Buy shares</button>
            </form>
          </section>

          <!-- Watchlist -->
          <section class="card watchlist-card">
            <div class="card-head">
              <h2>Watchlist</h2>
              <div class="filter-chips" id="filterChips">
                <button class="chip active" data-filter="all">All</button>
                <button class="chip" data-filter="gainers">Gainers</button>
                <button class="chip" data-filter="losers">Losers</button>
              </div>
            </div>
            <div class="table-wrap">
              <table class="data-table" id="watchlistTable">
                <thead>
                  <tr><th>Symbol</th><th>Price</th><th>Change</th><th class="hide-sm">Volume</th><th></th></tr>
                </thead>
                <tbody id="watchlistBody"></tbody>
              </table>
            </div>
          </section>

          <!-- Market overview -->
          <section class="card market-card">
            <div class="card-head"><h2>Market overview</h2></div>
            <div class="index-grid" id="indexGrid"></div>
          </section>

          <!-- Recent orders -->
          <section class="card orders-card">
            <div class="card-head"><h2>Recent orders</h2></div>
            <div class="table-wrap">
              <table class="data-table" id="ordersTable">
                <thead>
                  <tr><th>Symbol</th><th>Side</th><th>Qty</th><th>Price</th><th class="hide-sm">Time</th><th>Status</th></tr>
                </thead>
                <tbody id="ordersBody"></tbody>
              </table>
            </div>
          </section>

        </div>
      </main>
    </div>
  </div>

  <div class="toast-stack" id="toastStack"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
